<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Editor Turni – Farm. Della Stazione</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f1; color: #1a1a1a; font-size: 15px; }
  .topbar { background: #2e7d4f; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 17px; font-weight: 700; }
  .topbar-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }
  .save-btn { background: #fff; color: #2e7d4f; border: none; border-radius: 6px; padding: 7px 16px; font-weight: 700; font-size: 14px; cursor: pointer; }
  .save-btn:active { opacity: 0.8; }
  .save-btn:disabled { opacity: 0.5; cursor: default; }
  .token-bar { background: #fff3cd; padding: 10px 16px; display: flex; gap: 8px; align-items: center; }
  .token-bar input { flex: 1; border: 1px solid #ccc; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: monospace; }
  .token-bar label { font-size: 12px; font-weight: 600; color: #856404; white-space: nowrap; }
  .status-bar { padding: 8px 16px; font-size: 12px; color: #555; background: #e8f5e9; border-bottom: 1px solid #c8e6c9; min-height: 34px; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #fff; border-bottom: 1px solid #dde8e0; }
  .month-nav button { background: #f0f4f1; border: 1px solid #ccc; border-radius: 6px; padding: 6px 14px; font-size: 14px; cursor: pointer; }
  .month-title { font-size: 18px; font-weight: 700; color: #2e7d4f; }
  .cal { padding: 8px; }
  .cal-header { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 3px; }
  .cal-hday { text-align: center; font-size: 11px; color: #888; font-weight: 600; padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-cell { background: #fff; border-radius: 6px; border: 1.5px solid #e0e0e0; min-height: 56px; padding: 4px; cursor: pointer; position: relative; display: flex; flex-direction: column; }
  .cal-cell:active { background: #e8f5e9; }
  .cal-cell.empty { background: none; border-color: transparent; cursor: default; }
  .cal-cell.today { border-color: #2e7d4f; border-width: 2px; }
  .cal-cell.modified { border-color: #e65100; }
  .cal-cell.us { background: #e8f5e9; }
  .cal-num { font-size: 11px; font-weight: 700; color: #555; }
  .cal-cell.today .cal-num { color: #2e7d4f; }
  .cal-farm { font-size: 9px; color: #333; margin-top: 2px; line-height: 1.2; }
  .cal-farm.us { color: #2e7d4f; font-weight: 700; }
  .cal-mod-dot { width: 6px; height: 6px; background: #e65100; border-radius: 50%; position: absolute; top: 3px; right: 3px; }
  .cal-straord { font-size: 8px; color: #1565c0; }
  .cal-nota { font-size: 8px; color: #880e4f; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; padding: 0 0 24px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: #ccc; border-radius: 2px; margin: 12px auto 8px; }
  .modal-title { font-size: 16px; font-weight: 700; padding: 0 16px 12px; border-bottom: 1px solid #eee; }
  .modal-date { font-size: 12px; color: #888; font-weight: 400; }
  .modal-body { padding: 16px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea { width: 100%; border: 1.5px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 15px; font-family: inherit; background: #fafafa; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #2e7d4f; background: #fff; }
  .field textarea { resize: none; height: 70px; }
  .field-hint { font-size: 11px; color: #888; margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; padding: 0 16px; margin-top: 4px; }
  .btn-reset { flex: 1; background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-save { flex: 2; background: #2e7d4f; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; }
</style>
<script src="turni-parser.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Editor Turni</div>
    <div class="topbar-sub">Farmacia della Stazione</div>
  </div>
  <button class="save-btn" id="saveAllBtn" onclick="saveAll()">💾 Salva</button>
</div>

<div class="token-bar">
  <label>GitHub Token</label>
  <input type="password" id="tokenInput" placeholder="github_pat_..." oninput="saveToken(this.value)">
</div>

<div style="background:#eef4ff;padding:10px 16px;border-bottom:1px solid #d6e2f5;">
  <button style="background:#1565c0;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;"
    onclick="document.getElementById('pdfAnno').click()">📅 Importa calendario annuale (PDF)</button>
  <input type="file" id="pdfAnno" accept="application/pdf" style="display:none" onchange="importaCalendario(this.files[0])">
  <button style="background:#6a1b9a;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;margin-left:8px;"
    onclick="document.getElementById('pdfBollettino').click()">📋 Importa bollettino settimanale (PDF)</button>
  <input type="file" id="pdfBollettino" accept="application/pdf" style="display:none" onchange="importaBollettino(this.files[0])">
</div>

<div class="status-bar" id="statusBar">Caricamento...</div>

<div class="month-nav">
  <button onclick="changeMonth(-1)">‹</button>
  <div class="month-title" id="monthTitle">—</div>
  <button onclick="changeMonth(1)">›</button>
</div>

<div class="cal">
  <div class="cal-header">
    <div class="cal-hday">Lun</div><div class="cal-hday">Mar</div><div class="cal-hday">Mer</div>
    <div class="cal-hday">Gio</div><div class="cal-hday">Ven</div><div class="cal-hday">Sab</div>
    <div class="cal-hday">Dom</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">—</div>
    <button class="btn-close" onclick="closeModal()">✕</button>
    <div class="modal-body">
      <div class="field">
        <label>Farmacia di turno</label>
        <select id="fTurno"></select>
        <div class="field-hint">Lascia vuoto se nessuna farmacia è di turno</div>
      </div>
      <div class="field">
        <label>Contorno (supporto)</label>
        <select id="fContorno">
          <option value="">— nessuno —</option>
        </select>
      </div>
      <div class="field">
        <label>Orario fine turno</label>
        <input type="time" id="fFine" value="08:30">
        <div class="field-hint">Di norma 08:30 del giorno successivo</div>
      </div>
      <div class="field">
        <label>Apertura straordinaria</label>
        <input type="text" id="fStraord" placeholder="es. Beretta 8:00–20:00">
      </div>
      <div class="field">
        <label>Nota libera</label>
        <textarea id="fNota" placeholder="es. Farmacia in ferie, sostituita da..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-reset" onclick="resetDay()">↩ Ripristina base</button>
        <button class="btn-save" onclick="saveDay()">✓ Conferma</button>
      </div>
    </div>
  </div>
</div>

<script>
const GIST_ID = '8f699fa0fd4566b2bbb2805b76ad482e';
const GIST_FILE = 'turni-overrides.json';
const TOKEN_KEY = 'edit_turni_token';

const FARMACIE = [
  '— nessuna —','Alleanza','Argentieri','Baracchini','Beretta','Bergero','Bonaschi',
  'Campodonico','Centrale','Croce Bianca','Croce Rossa','Croce Verde','Degli Speziali',
  'Del Porto','Dell\'Aquila','Dell\'Arsenale','Della Marina','Della Stazione','Di Marola/Maimone',
  'Di Prima','Farmaceutica','Farina','Felia Prione','Internazionale','Maglio','Migliarina',
  'S.ta Barbara','Schiaffino','Tapparo','Tarantola'
];

let TURNI_BASE = {};

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI_IT = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];

let overrides = {};
let viewMonth, viewYear, editKey;
let dirty = false;
let modalSnapshot = null;

function toKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function saveToken(v) { localStorage.setItem(TOKEN_KEY, v); }

async function loadBase() {
  const yr = new Date().getFullYear();
  const parts = await Promise.all([yr - 1, yr, yr + 1].map(y =>
    fetch(`data/turni-${y}.json`).then(r => r.ok ? r.json() : {}).catch(() => ({}))
  ));
  TURNI_BASE = Object.assign({}, ...parts);
}

async function loadFromGist() {
  setStatus('Caricamento dal Gist...', false);
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': 'token ' + getToken(), 'Accept': 'application/vnd.github.v3+json' },
      cache: 'no-store'
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const bf = data.files['turni-base.json'];
    if (bf && bf.content) {
      const b = JSON.parse(bf.content);
      if (b && Object.keys(b).length) TURNI_BASE = b;
    }
    overrides = JSON.parse(data.files[GIST_FILE].content).overrides || {};
    const n = Object.keys(overrides).length;
    setStatus(`✓ Caricato — ${n} modific${n===1?'a':'he'} salvat${n===1?'a':'e'}`, false);
  } catch(e) {
    setStatus('⚠ Impossibile caricare (' + e.message + '). Verifica il token.', true);
  }
  renderCal();
}

async function saveAll() {
  const token = getToken();
  if (!token) { setStatus('⚠ Inserisci prima il GitHub Token', true); return; }
  const btn = document.getElementById('saveAllBtn');
  btn.disabled = true; btn.textContent = '⏳';
  setStatus('Salvataggio...', false);
  try {
    const payload = { overrides };
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(payload, null, 2) } } })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    dirty = false;
    setStatus('✓ Salvato sul Gist — la bacheca si aggiornerà entro 5 minuti', false);
  } catch(e) {
    setStatus('⚠ Errore salvataggio: ' + e.message, true);
  }
  btn.disabled = false; btn.textContent = '💾 Salva';
}

const PDF_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Estrae tutto il testo da un PDF nel browser (pdf.js).
async function estraiTestoPDF(file) {
  if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js non caricato (serve connessione internet)');
  pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER;
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    text += c.items.map(i => i.str).join(' ') + ' ';
  }
  return text;
}

// Import del calendario annuale: PDF -> parser condiviso -> base sul Gist.
async function importaCalendario(file) {
  if (!file) return;
  setStatus('Lettura del PDF...', false);
  try {
    const text = await estraiTestoPDF(file);
    const m = text.match(/ANNO\s+(\d{4})/);
    if (!m) { setStatus('⚠ Anno non trovato nel PDF (manca "ANNO XXXX"). Controlla di aver scelto il calendario annuale.', true); return; }
    const anno = parseInt(m[1], 10);
    const { turni, problemi } = TurniParser.parseAnnualText(text, anno);
    const n = Object.keys(turni).length;
    if (problemi.length) {
      console.warn('Giorni non riconosciuti:', problemi);
      setStatus(`⚠ ${problemi.length} giorni non riconosciuti nel PDF ${anno} — nessun salvataggio. Dettagli nella console.`, true);
      return;
    }
    const token = getToken();
    if (!token) { setStatus(`✓ PDF letto: ${anno}, ${n} giorni riconosciuti. Inserisci il GitHub Token per salvare sul Gist.`, false); return; }
    if (!confirm(`Calendario ${anno}: riconosciuti ${n} giorni.\nSalvare la base sul Gist? (sostituisce la base dell'anno ${anno})`)) {
      setStatus('Import annullato.', false); return;
    }
    const merged = Object.assign({}, TURNI_BASE, turni); // mantiene gli altri anni
    setStatus('Salvataggio base sul Gist...', false);
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'turni-base.json': { content: JSON.stringify(merged) } } })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    TURNI_BASE = merged;
    setStatus(`✓ Calendario ${anno} salvato (${n} giorni). La bacheca si aggiornerà entro 5 minuti.`, false);
    renderCal();
  } catch (e) {
    setStatus('⚠ Errore import: ' + e.message, true);
  } finally {
    const inp = document.getElementById('pdfAnno');
    if (inp) inp.value = '';
  }
}

// Import del bollettino settimanale: PDF -> parser condiviso -> SOLO le differenze
// rispetto alla base finiscono negli override. Non salva: stage in memoria, poi 💾 Salva.
async function importaBollettino(file) {
  if (!file) return;
  setStatus('Lettura del bollettino...', false);
  try {
    const text = await estraiTestoPDF(file);
    const { turni, problemi } = TurniParser.parseBulletin(text);
    const giorni = Object.keys(turni).sort();
    if (!giorni.length) {
      setStatus('⚠ Nessun giorno riconosciuto nel bollettino. Controlla di aver scelto il file giusto.', true);
      return;
    }
    const etich = r => r && r.t ? r.t + (r.c ? ' + ' + r.c : '') : '(nessuna)';
    // Tiene solo i giorni in cui il bollettino differisce dalla base.
    const diffs = giorni.filter(k => {
      const b = TURNI_BASE[k] || {}, n = turni[k];
      return (b.t || '') !== (n.t || '') || (b.c || '') !== (n.c || '');
    });
    if (problemi.length) console.warn('Bollettino — blocchi non riconosciuti:', problemi);
    const range = giorni[0] + ' → ' + giorni[giorni.length - 1];
    const coda = problemi.length ? `\n⚠ ${problemi.length} blocchi non riconosciuti (vedi console).` : '';
    if (!diffs.length) {
      setStatus(`✓ Bollettino ${range}: ${giorni.length} giorni, tutti già coerenti con la base. Nessuna modifica.${coda}`, false);
      return;
    }
    const elenco = diffs.map(k => `• ${k}: ${etich(TURNI_BASE[k])}  →  ${etich(turni[k])}`).join('\n');
    if (!confirm(`Bollettino ${range}: ${giorni.length} giorni letti, ${diffs.length} diversi dalla base.${coda}\n\nDifferenze:\n${elenco}\n\nApplicare queste modifiche agli override? (poi premi 💾 Salva per pubblicare)`)) {
      setStatus('Import bollettino annullato.', false);
      return;
    }
    diffs.forEach(k => {
      const next = Object.assign({}, overrides[k], { t: turni[k].t }); // preserva fineOra/straord/nota
      if (turni[k].c) next.c = turni[k].c; else delete next.c;
      overrides[k] = next;
    });
    dirty = true;
    renderCal();
    setStatus(`✓ Applicate ${diffs.length} modifiche dal bollettino (${range}). Premi 💾 Salva per pubblicare.`, false);
  } catch (e) {
    setStatus('⚠ Errore import bollettino: ' + e.message, true);
  } finally {
    const inp = document.getElementById('pdfBollettino');
    if (inp) inp.value = '';
  }
}

function setStatus(msg, err) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.style.background = err ? '#ffebee' : '#e8f5e9';
  el.style.color = err ? '#c62828' : '#1b5e20';
}

function changeMonth(d) {
  viewMonth += d;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCal();
}

function renderCal() {
  const now = new Date();
  const todayKey = toKey(now);
  document.getElementById('monthTitle').textContent = MESI[viewMonth] + ' ' + viewYear;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const first = new Date(viewYear, viewMonth, 1);
  let dow = first.getDay(); if (dow === 0) dow = 7;
  for (let i = 1; i < dow; i++) {
    const e = document.createElement('div'); e.className = 'cal-cell empty'; grid.appendChild(e);
  }
  const days = new Date(viewYear, viewMonth+1, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = toKey(date);
    const base = TURNI_BASE[key];
    const ov = overrides[key];
    const nome = ov && ov.t !== undefined ? ov.t : (base ? base.t : null);
    const isUs = nome === 'Della Stazione';
    const isModified = !!ov;
    const isToday = key === todayKey;
    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (isModified) cls += ' modified';
    if (isUs) cls += ' us';
    cell.className = cls;
    cell.onclick = () => openModal(key, date);
    cell.innerHTML = `<div class="cal-num">${d}</div>`;
    if (nome) {
      const farm = document.createElement('div');
      farm.className = 'cal-farm' + (isUs ? ' us' : '');
      const short = nome.length > 9 ? nome.substring(0,9)+'…' : nome;
      farm.textContent = short;
      cell.appendChild(farm);
    }
    if (ov && ov.straord) {
      const s = document.createElement('div');
      s.className = 'cal-straord'; s.textContent = '★'; cell.appendChild(s);
    }
    if (ov && ov.nota) {
      const n = document.createElement('div');
      n.className = 'cal-nota'; n.textContent = '📌'; cell.appendChild(n);
    }
    if (isModified) {
      const dot = document.createElement('div'); dot.className = 'cal-mod-dot'; cell.appendChild(dot);
    }
    grid.appendChild(cell);
  }
}

function populateSelects(selectedT, selectedC) {
  const tEl = document.getElementById('fTurno');
  const cEl = document.getElementById('fContorno');
  tEl.innerHTML = '';
  cEl.innerHTML = '<option value="">— nessuno —</option>';
  FARMACIE.forEach(f => {
    const o = document.createElement('option');
    o.value = f === '— nessuna —' ? '' : f;
    o.textContent = f;
    if ((f === '— nessuna —' && !selectedT) || f === selectedT) o.selected = true;
    tEl.appendChild(o);
    if (f !== '— nessuna —') {
      const o2 = document.createElement('option');
      o2.value = f; o2.textContent = f;
      if (f === selectedC) o2.selected = true;
      cEl.appendChild(o2);
    }
  });
}

function openModal(key, date) {
  editKey = key;
  const base = TURNI_BASE[key];
  const ov = overrides[key] || {};
  const nome = ov.t !== undefined ? ov.t : (base ? base.t : '');
  const cont = ov.c !== undefined ? ov.c : (base ? (base.c || '') : '');
  populateSelects(nome, cont);
  document.getElementById('fFine').value = ov.fineOra || '08:30';
  document.getElementById('fStraord').value = ov.straord || '';
  document.getElementById('fNota').value = ov.nota || '';
  const G = GIORNI_IT[date.getDay()];
  document.getElementById('modalTitle').innerHTML =
    `Modifica turno <span class="modal-date">${G} ${date.getDate()} ${MESI[date.getMonth()].toLowerCase()}</span>`;
  document.getElementById('modalBg').className = 'modal-bg open';
  modalSnapshot = snapshotModal();
}

// Stringa che rappresenta lo stato corrente dei campi del modal
function snapshotModal() {
  return JSON.stringify([
    document.getElementById('fTurno').value,
    document.getElementById('fContorno').value,
    document.getElementById('fFine').value,
    document.getElementById('fStraord').value.trim(),
    document.getElementById('fNota').value.trim()
  ]);
}

function modalIsOpen() { return document.getElementById('modalBg').classList.contains('open'); }
function modalHasChanges() { return modalIsOpen() && modalSnapshot !== null && snapshotModal() !== modalSnapshot; }

// Chiusura "sicura": avvisa se ci sono modifiche non confermate
function closeModal() {
  if (modalHasChanges() && !confirm('Hai modifiche non confermate in questo giorno. Chiudere senza confermarle?')) return;
  forceCloseModal();
}
function forceCloseModal() {
  modalSnapshot = null;
  document.getElementById('modalBg').className = 'modal-bg';
}
function closeModalBg(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

function saveDay() {
  const base = TURNI_BASE[editKey];
  const t = document.getElementById('fTurno').value;
  const c = document.getElementById('fContorno').value;
  const fineOra = document.getElementById('fFine').value;
  const straord = document.getElementById('fStraord').value.trim();
  const nota = document.getElementById('fNota').value.trim();
  const isDefault =
    t === (base ? base.t : '') &&
    c === (base ? (base.c || '') : '') &&
    fineOra === '08:30' &&
    !straord && !nota;
  if (isDefault) {
    delete overrides[editKey];
  } else {
    const ov = {};
    if (t !== (base ? base.t : '')) ov.t = t;
    if (c !== (base ? (base.c || '') : '')) ov.c = c;
    if (fineOra !== '08:30') ov.fineOra = fineOra;
    if (straord) ov.straord = straord;
    if (nota) ov.nota = nota;
    overrides[editKey] = ov;
  }
  dirty = true;
  setStatus('✎ Modifiche non salvate — premi 💾 Salva', false);
  forceCloseModal();
  renderCal();
}

function resetDay() {
  delete overrides[editKey];
  dirty = true;
  setStatus('✎ Modifiche non salvate — premi 💾 Salva', false);
  forceCloseModal();
  renderCal();
}

// Avvisa se si chiude/ricarica con modifiche non salvate
window.addEventListener('beforeunload', (e) => {
  if (dirty || modalHasChanges()) { e.preventDefault(); e.returnValue = ''; }
});

// Init
const now = new Date();
viewMonth = now.getMonth();
viewYear = now.getFullYear();
const saved = getToken();
if (saved) document.getElementById('tokenInput').value = saved;
(async () => {
  await loadBase();
  await loadFromGist();
})();
</script>
